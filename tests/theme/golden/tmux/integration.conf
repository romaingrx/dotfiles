# vim:set ft=tmux:
# Generated by Home Manager - romaingrx theme contract integration for tmux.

# Drive the Catppuccin flavor from the active runtime appearance.
source-file -q '/run/theme/current/tmux/flavor.conf'

# prefix + T flips the *global* appearance so every consumer re-themes
# together.
bind T run-shell 'if [ "$(/run/bin/romaingrx-theme-get)" = dark ]; then /run/bin/romaingrx-theme-set light; else /run/bin/romaingrx-theme-set dark; fi'
