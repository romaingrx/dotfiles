[general]
import = [
    "~/.local/share/alacritty/active-theme.toml",
]

[font]
# Family/style come from the generated theme import (active-theme.toml); see
# lib/theme/fonts.nix. Size and offset are layout choices kept here.
size = 13.0

[font.offset]
x = 0
y = 1

[window]
decorations = "Buttonless"
dynamic_title = true
opacity = 0.95

[env]
TERM = "xterm-256color"

[cursor.style]
shape = "Block"
blinking = "On"

[cursor.vi_mode_style]
shape = "Block"

[scrolling]
history = 10000

[mouse]
hide_when_typing = true
