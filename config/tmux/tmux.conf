set -g default-terminal "tmux-256color"
set -g mouse on

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind C attach-session -c "#{pane_current_path}" \; display-message "New working directory: #{pane_current_path}"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# --- Vim-Tmux Navigator ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Clear screen with prefix + C-l (since C-l is now used for navigation)
bind C-l send-keys C-l \; clear-history

# --- Plugins (TPM) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# Toggle light (latte) / dark (mocha): prefix + T
bind T if-shell '[ "$(tmux show -gv @catppuccin_flavor)" = "mocha" ]' \
  'set -g @catppuccin_flavor "latte" ; run ~/.tmux/plugins/tmux/catppuccin.tmux' \
  'set -g @catppuccin_flavor "mocha" ; run ~/.tmux/plugins/tmux/catppuccin.tmux'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '10'

# Auto-install TPM if not present, then initialize
if-shell "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
